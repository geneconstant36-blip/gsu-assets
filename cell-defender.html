<script>
const Q=[
["The 'brain' of the cell that controls all activities is the:","Nucleus|Mitochondria|Ribosome|Cell membrane",0],
["The powerhouse of the cell that makes energy (ATP) is the:","Nucleus|Mitochondria|Ribosome|Vacuole",1],
["Protein factories of the cell are called:","Nucleus|Mitochondria|Ribosomes|Vacuoles",2],
["The cell's outer boundary that controls what enters/exits is the:","Nucleus|Cell wall|Cell membrane|Cytoplasm",2],
["The jelly-like fluid filling the cell is called:","Nucleus|Cytoplasm|Vacuole|Chloroplast",1],
["Storage containers in the cell are called:","Vacuoles|Ribosomes|Nuclei|Mitochondria",0],
["Plant cells make food in the:","Mitochondria|Chloroplasts|Ribosomes|Vacuoles",1],
["Chloroplasts contain this green pigment:","Hemoglobin|Chlorophyll|Melanin|Cytoplasm",1],
["Plant cells have this rigid outer layer that animal cells lack:","Cell membrane|Cell wall|Cytoplasm|Vacuole",1],
["The process of making food from sunlight is:","Respiration|Photosynthesis|Digestion|Fermentation",1],
["The process cells use to release energy from food is:","Photosynthesis|Cellular respiration|Digestion|Osmosis",1],
["DNA is found in the:","Cytoplasm|Nucleus|Ribosome|Vacuole",1],
["The endoplasmic reticulum (ER) helps with:","Energy production|Transport within cell|Photosynthesis|Storage",1],
["Rough ER has these attached to it:","Mitochondria|Ribosomes|Vacuoles|Chloroplasts",1],
["The Golgi body packages and ships:","DNA|Proteins|Chlorophyll|Water",1],
["Lysosomes break down:","Food|Waste and worn-out parts|DNA|ATP",1],
["Which is found ONLY in plant cells?","Nucleus|Mitochondria|Cell wall|Ribosome",2],
["Which is found ONLY in animal cells?","Vacuole|Centrioles|Ribosome|Cytoplasm",1],
["Which is found in BOTH plant and animal cells?","Cell wall|Chloroplast|Mitochondria|Centrioles",2],
["Vacuoles in plant cells are usually:","Small and many|One large central vacuole|Absent|Same as animal cells",1],
["Osmosis is the movement of:","Food|Water across a membrane|DNA|Proteins",1],
["Diffusion moves particles from:","Low to high concentration|High to low concentration|Inside to outside only|Outside to inside only",1],
["Active transport requires:","Energy|No energy|Sunlight|Water",0],
["Passive transport requires:","Energy|No energy|ATP|Glucose",1],
["The cell cycle includes growth and:","Sleep|Division|Photosynthesis|Respiration",1],
["Mitosis produces:","1 cell|2 identical cells|4 cells|8 cells",1],
["Meiosis produces:","1 cell|2 cells|4 sex cells|8 cells",2],
["Chromosomes carry:","Water|Genetic information (DNA)|Proteins|Energy",1],
["Prokaryotic cells (like bacteria) lack a:","Cell membrane|Nucleus|Ribosome|Cytoplasm",1],
["Eukaryotic cells have a:","No nucleus|True nucleus|No membrane|No ribosomes",1],
["Animal cells are:","Prokaryotic|Eukaryotic|Both|Neither",1],
["Bacteria are:","Prokaryotic|Eukaryotic|Both|Neither",0],
["Plant cells are:","Prokaryotic|Eukaryotic|Both|Neither",1],
["Single-celled organisms are called:","Multicellular|Unicellular|Acellular|Bicellular",1],
["Organisms with many cells are:","Unicellular|Multicellular|Acellular|Nocellular",1],
["What gives plants their green color?","Vacuole|Chlorophyll|Cytoplasm|Nucleus",1],
["Plants release this gas during photosynthesis:","Carbon dioxide|Oxygen|Nitrogen|Hydrogen",1],
["Plants take in this gas for photosynthesis:","Oxygen|Carbon dioxide|Nitrogen|Hydrogen",1],
["Cellular respiration produces:","Glucose|ATP (energy)|Chlorophyll|DNA",1],
["Cellular respiration uses:","Sunlight|Glucose and oxygen|Carbon dioxide and water|Chlorophyll",1],
["The equation for photosynthesis involves:","Sunlight + CO2 + H2O → Glucose + O2|Glucose + O2 → CO2 + H2O + ATP|Neither|Both are wrong",0],
["The equation for respiration involves:","Sunlight + CO2 + H2O → Glucose + O2|Glucose + O2 → CO2 + H2O + ATP|Neither|Both are wrong",1],
["Mitochondria are found in:","Plant cells only|Animal cells only|Both plant and animal cells|Neither",2],
["Without mitochondria, a cell couldn't:","Make proteins|Produce energy (ATP)|Store water|Make DNA",1],
["Without a nucleus, a cell couldn't:","Move|Control its activities|Have cytoplasm|Have a membrane",1],
["Without ribosomes, a cell couldn't:","Move|Make proteins|Store water|Divide",1],
["Selectively permeable means:","Nothing can pass|Everything can pass|Only some things can pass|Only water can pass",2],
["The cell membrane is:","Rigid|Selectively permeable|Made of cellulose|Found only in plants",1],
["Cytoskeleton gives the cell:","Color|Shape and support|Energy|DNA",1],
["Vesicles are small:","Storage/transport sacs|Energy producers|Protein makers|DNA holders",0],
["Red blood cells carry:","Carbon dioxide|Oxygen|Proteins|DNA",1],
["Nerve cells transmit:","Blood|Oxygen|Electrical signals|Food",2],
["Muscle cells can:","Photosynthesize|Contract and relax|Produce offspring|Think",1],
["Stem cells can become:","Only one cell type|Many different cell types|No other cell types|Dead cells",1],
["Tissues are made of:","One cell|Similar cells working together|Different organisms|Organs",1],
["Organs are made of:","One cell|One tissue|Different tissues|Organisms",2],
["Organ systems are made of:","Cells|Tissues|Organs working together|One organ",2],
["Smallest to largest: Cell, Tissue, Organ, Organ System, Organism","Correct order|Wrong order|Missing levels|Backwards",0],
["The human body has approximately:","Thousands of cells|Millions of cells|Trillions of cells|Hundreds of cells",2]
];
let sc=0,st=0,ca=0,sl=null;
function ld(){const q=Q[Math.floor(Math.random()*Q.length)],p=q[1].split('|');ca=q[2];sl=null;document.getElementById('qt').textContent=q[0];document.getElementById('ao').innerHTML=p.map((o,i)=>`<button class="ab" onclick="sel(${i})">${o}</button>`).join('');document.getElementById('fb').className='fb';}
function sel(i){sl=i;document.querySelectorAll('.ab').forEach((b,j)=>{b.classList.remove('s');if(j===i)b.classList.add('s');});}
function ck(){if(sl===null)return;const bs=document.querySelectorAll('.ab'),fb=document.getElementById('fb');if(sl===ca){sc++;st++;fb.textContent='🛡️ DEFENDED!';fb.className='fb c';bs[sl].classList.add('c');ub();}else{st=0;fb.textContent='❌ Cell breach!';fb.className='fb i';bs[sl].classList.add('i');bs[ca].classList.add('c');}document.getElementById('sc').textContent=sc;document.getElementById('st').textContent=st+'🔥';}
function nx(){ld();}
function ub(){if(sc>=5)document.getElementById('b1').classList.add('e');if(sc>=15)document.getElementById('b2').classList.add('e');if(sc>=30)document.getElementById('b3').classList.add('e');if(sc>=50)document.getElementById('b4').classList.add('e');}
ld();
</script>
