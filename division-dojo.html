<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Division Dojo | GSU Mathification</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Orbitron:wght@700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Montserrat',sans-serif;background:linear-gradient(135deg,#0a192f 0%,#112240 60%,#0a192f 100%);min-height:100vh;color:#e2e8f0;display:flex;flex-direction:column;align-items:center;padding:20px}
.game-header{text-align:center;margin-bottom:24px;width:100%;max-width:700px}
.game-title{font-family:'Orbitron',monospace;font-size:clamp(1.4rem,4vw,2.2rem);color:#d4af37;text-shadow:0 0 20px rgba(212,175,55,0.4);margin-bottom:6px}
.game-subtitle{color:#06b6d4;font-size:.85rem;letter-spacing:2px;text-transform:uppercase}
.badge-bar{display:flex;justify-content:center;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.badge{display:flex;flex-direction:column;align-items:center;gap:4px;opacity:.35;transition:opacity .4s,transform .3s}
.badge.earned{opacity:1;transform:scale(1.1)}
.badge-icon{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.4rem;border:2px solid}
.badge-bronze .badge-icon{background:rgba(205,127,50,.2);border-color:#cd7f32}
.badge-silver .badge-icon{background:rgba(192,192,192,.2);border-color:#c0c0c0}
.badge-gold .badge-icon{background:rgba(212,175,55,.2);border-color:#d4af37}
.badge-plat .badge-icon{background:rgba(6,182,212,.2);border-color:#06b6d4}
.badge-label{font-size:9px;letter-spacing:1px;text-transform:uppercase;color:#8892b0;text-align:center}
.progress-row{width:100%;max-width:700px;display:flex;align-items:center;gap:12px;margin-bottom:20px}
.progress-track{flex:1;height:8px;background:rgba(255,255,255,.08);border-radius:4px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#d4af37,#06b6d4);border-radius:4px;transition:width .4s ease;width:0%}
.progress-label{font-family:monospace;font-size:12px;color:#8892b0;white-space:nowrap}
.score-row{display:flex;gap:24px;justify-content:center;margin-bottom:20px;flex-wrap:wrap}
.score-box{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:10px 20px;text-align:center}
.score-num{font-family:'Orbitron',monospace;font-size:1.6rem;color:#d4af37}
.score-lbl{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:#8892b0}
.question-card{width:100%;max-width:700px;background:rgba(255,255,255,.04);border:1px solid rgba(6,182,212,.25);border-radius:16px;padding:32px 28px;margin-bottom:20px;text-align:center}
.q-number{font-family:monospace;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:#06b6d4;margin-bottom:12px}
.q-text{font-size:clamp(1rem,3vw,1.3rem);font-weight:700;color:#fff;line-height:1.5;min-height:60px;display:flex;align-items:center;justify-content:center}
.answers{display:grid;grid-template-columns:1fr 1fr;gap:12px;width:100%;max-width:700px;margin-bottom:20px}
.ans-btn{background:rgba(255,255,255,.05);border:2px solid rgba(255,255,255,.12);border-radius:12px;padding:16px 12px;font-family:'Montserrat',sans-serif;font-size:1rem;font-weight:600;color:#e2e8f0;cursor:pointer;transition:all .2s;min-height:60px}
.ans-btn:hover:not(:disabled){background:rgba(6,182,212,.15);border-color:#06b6d4;transform:translateY(-2px)}
.ans-btn.correct{background:rgba(34,197,94,.2);border-color:#22c55e;color:#22c55e}
.ans-btn.wrong{background:rgba(239,68,68,.15);border-color:#ef4444;color:#ef4444}
.ans-btn:disabled{cursor:default}
.feedback{width:100%;max-width:700px;background:rgba(255,255,255,.04);border-radius:12px;padding:16px 20px;margin-bottom:16px;font-size:.9rem;color:#cbd5e1;line-height:1.5;min-height:56px;display:flex;align-items:center;border-left:4px solid transparent;transition:border-color .3s}
.feedback.show-correct{border-left-color:#22c55e}
.feedback.show-wrong{border-left-color:#ef4444}
.control-row{display:flex;gap:12px;justify-content:center;width:100%;max-width:700px;margin-bottom:24px;flex-wrap:wrap}
.btn{padding:14px 28px;border-radius:10px;font-family:'Montserrat',sans-serif;font-size:.9rem;font-weight:700;letter-spacing:1px;cursor:pointer;border:none;transition:all .2s}
.btn-primary{background:linear-gradient(135deg,#d4af37,#b8960c);color:#0a192f}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(212,175,55,.3)}
.btn-secondary{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);color:#e2e8f0}
.btn-secondary:hover{background:rgba(255,255,255,.14)}
.geno-bar{display:flex;align-items:center;gap:12px;background:rgba(255,255,255,.04);border:1px solid rgba(212,175,55,.2);border-radius:12px;padding:10px 16px;width:100%;max-width:700px;margin-bottom:24px;cursor:pointer;transition:background .2s}
.geno-bar:hover{background:rgba(255,255,255,.08)}
.geno-avatar{width:36px;height:36px;border-radius:50%;object-fit:cover;border:2px solid #d4af37}
.geno-text{font-size:.82rem;color:#8892b0;flex:1}
.geno-status{font-family:monospace;font-size:10px;color:#06b6d4;letter-spacing:1px;text-transform:uppercase}
.summary{display:none;width:100%;max-width:700px;background:rgba(255,255,255,.04);border:1px solid rgba(212,175,55,.3);border-radius:20px;padding:40px 32px;text-align:center}
.summary h2{font-family:'Orbitron',monospace;color:#d4af37;font-size:1.8rem;margin-bottom:12px}
.summary-score{font-size:3rem;font-weight:800;color:#06b6d4;margin:16px 0}
.earned-badges{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;margin:24px 0}
.hidden{display:none!important}
</style>
</head>
<body>
<div class="game-header">
  <div class="game-title">🥋 Division Dojo</div>
  <div class="game-subtitle">Mathification · GSU · Grades 3–5 · 60 Questions</div>
</div>
<div class="badge-bar">
  <div class="badge badge-bronze" id="badge-bronze"><div class="badge-icon">🥉</div><div class="badge-label">Bronze<br>Q15</div></div>
  <div class="badge badge-silver" id="badge-silver"><div class="badge-icon">🥈</div><div class="badge-label">Silver<br>Q30</div></div>
  <div class="badge badge-gold" id="badge-gold"><div class="badge-icon">🥇</div><div class="badge-label">Gold<br>Q45</div></div>
  <div class="badge badge-plat" id="badge-plat"><div class="badge-icon">💎</div><div class="badge-label">Platinum<br>Q60</div></div>
</div>
<div class="progress-row">
  <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
  <div class="progress-label" id="progress-label">0 / 60</div>
</div>
<div class="score-row">
  <div class="score-box"><div class="score-num" id="score-correct">0</div><div class="score-lbl">Correct</div></div>
  <div class="score-box"><div class="score-num" id="score-streak">0</div><div class="score-lbl">Streak 🔥</div></div>
  <div class="score-box"><div class="score-num" id="score-total">0</div><div class="score-lbl">Answered</div></div>
</div>
<div class="geno-bar" id="geno-bar" onclick="genoSpeak()">
  <img class="geno-avatar" src="https://cdn.prod.website-files.com/690a4028667a2e2c27b665d0/69768f7aaae58ca85c3ce25e_Geno%20head-round.png" alt="GENO">
  <div class="geno-text" id="geno-text">Hi! I'm GENO. Click me to hear the question read aloud.</div>
  <div class="geno-status" id="geno-status">🔊 Ready</div>
</div>
<div class="question-card" id="question-card">
  <div class="q-number" id="q-number">Question 1 of 60</div>
  <div class="q-text" id="q-text">Loading…</div>
</div>
<div class="answers" id="answers"></div>
<div class="feedback" id="feedback"></div>
<div class="control-row">
  <button class="btn btn-primary hidden" id="btn-next" onclick="nextQuestion()">Next Question →</button>
  <button class="btn btn-secondary" onclick="restartGame()">↺ Restart</button>
</div>
<div class="summary" id="summary">
  <div style="font-size:3rem">🎉</div>
  <h2>Game Complete!</h2>
  <div class="summary-score" id="final-score">0 / 60</div>
  <div id="final-badges" class="earned-badges"></div>
  <p style="color:#8892b0;margin-bottom:24px" id="final-msg"></p>
  <button class="btn btn-primary" onclick="restartGame()">Play Again</button>
</div>
<script>
const ALL_QUESTIONS=[
  {q:"10 ÷ 2 = ?",a:"5",c:["5","4","6","3"]},
  {q:"12 ÷ 3 = ?",a:"4",c:["4","3","5","6"]},
  {q:"15 ÷ 5 = ?",a:"3",c:["3","4","5","2"]},
  {q:"20 ÷ 4 = ?",a:"5",c:["5","4","6","3"]},
  {q:"18 ÷ 6 = ?",a:"3",c:["3","4","2","5"]},
  {q:"24 ÷ 8 = ?",a:"3",c:["3","4","2","6"]},
  {q:"35 ÷ 7 = ?",a:"5",c:["5","6","4","3"]},
  {q:"36 ÷ 9 = ?",a:"4",c:["4","3","5","6"]},
  {q:"42 ÷ 6 = ?",a:"7",c:["7","6","8","5"]},
  {q:"45 ÷ 9 = ?",a:"5",c:["5","4","6","3"]},
  {q:"48 ÷ 6 = ?",a:"8",c:["8","7","6","9"]},
  {q:"54 ÷ 9 = ?",a:"6",c:["6","5","7","4"]},
  {q:"56 ÷ 7 = ?",a:"8",c:["8","7","6","9"]},
  {q:"63 ÷ 9 = ?",a:"7",c:["7","6","8","9"]},
  {q:"64 ÷ 8 = ?",a:"8",c:["8","7","6","9"]},
  {q:"72 ÷ 9 = ?",a:"8",c:["8","7","9","6"]},
  {q:"81 ÷ 9 = ?",a:"9",c:["9","8","7","6"]},
  {q:"32 ÷ 4 = ?",a:"8",c:["8","7","6","9"]},
  {q:"28 ÷ 4 = ?",a:"7",c:["7","6","8","5"]},
  {q:"30 ÷ 5 = ?",a:"6",c:["6","5","7","4"]},
  {q:"40 ÷ 8 = ?",a:"5",c:["5","4","6","7"]},
  {q:"49 ÷ 7 = ?",a:"7",c:["7","6","8","5"]},
  {q:"16 ÷ 4 = ?",a:"4",c:["4","3","5","6"]},
  {q:"21 ÷ 3 = ?",a:"7",c:["7","6","8","5"]},
  {q:"27 ÷ 3 = ?",a:"9",c:["9","8","7","6"]},
  {q:"100 ÷ 10 = ?",a:"10",c:["10","9","11","12"]},
  {q:"50 ÷ 5 = ?",a:"10",c:["10","9","11","8"]},
  {q:"60 ÷ 6 = ?",a:"10",c:["10","9","11","12"]},
  {q:"70 ÷ 7 = ?",a:"10",c:["10","9","11","8"]},
  {q:"80 ÷ 8 = ?",a:"10",c:["10","9","11","12"]},
  {q:"90 ÷ 9 = ?",a:"10",c:["10","9","11","12"]},
  {q:"110 ÷ 11 = ?",a:"10",c:["10","11","9","12"]},
  {q:"120 ÷ 12 = ?",a:"10",c:["10","11","9","12"]},
  {q:"144 ÷ 12 = ?",a:"12",c:["12","11","10","13"]},
  {q:"132 ÷ 11 = ?",a:"12",c:["12","11","10","13"]},
  {q:"You have 24 apples to share equally among 6 friends. How many does each get?",a:"4",c:["4","3","5","6"]},
  {q:"A teacher has 35 pencils to split between 7 tables. How many per table?",a:"5",c:["5","4","6","7"]},
  {q:"48 cookies divided equally into 8 bags. How many per bag?",a:"6",c:["6","5","7","8"]},
  {q:"$36 shared equally by 4 people. How much each?",a:"$9",c:["$9","$8","$7","$6"]},
  {q:"A team of 45 players is split into 9 equal groups. How many per group?",a:"5",c:["5","4","6","7"]},
  {q:"56 ÷ 8 = ?",a:"7",c:["7","6","8","5"]},
  {q:"66 ÷ 6 = ?",a:"11",c:["11","10","12","9"]},
  {q:"77 ÷ 7 = ?",a:"11",c:["11","10","12","9"]},
  {q:"88 ÷ 8 = ?",a:"11",c:["11","10","12","9"]},
  {q:"99 ÷ 9 = ?",a:"11",c:["11","10","12","9"]},
  {q:"What is the remainder of 17 ÷ 5?",a:"2",c:["2","1","3","0"]},
  {q:"What is the remainder of 22 ÷ 7?",a:"1",c:["1","2","3","0"]},
  {q:"What is the remainder of 13 ÷ 4?",a:"1",c:["1","2","3","0"]},
  {q:"What is the remainder of 19 ÷ 6?",a:"1",c:["1","2","3","4"]},
  {q:"What is the remainder of 25 ÷ 8?",a:"1",c:["1","2","3","4"]},
  {q:"If 3 × ? = 21, what is ?",a:"7",c:["7","6","8","5"]},
  {q:"If 8 × ? = 72, what is ?",a:"9",c:["9","8","7","6"]},
  {q:"If 7 × ? = 56, what is ?",a:"8",c:["8","7","6","9"]},
  {q:"If 6 × ? = 54, what is ?",a:"9",c:["9","8","7","6"]},
  {q:"If 9 × ? = 81, what is ?",a:"9",c:["9","8","7","6"]},
  {q:"200 ÷ 4 = ?",a:"50",c:["50","40","60","25"]},
  {q:"300 ÷ 5 = ?",a:"60",c:["60","50","70","30"]},
  {q:"400 ÷ 8 = ?",a:"50",c:["50","40","60","25"]},
  {q:"630 ÷ 9 = ?",a:"70",c:["70","60","80","63"]},
  {q:"480 ÷ 6 = ?",a:"80",c:["80","70","60","90"]},
  {q:"You earn $72 for 9 hours of work. What is your hourly rate?",a:"$8",c:["$8","$7","$9","$6"]}
];
const coaching=["Division is just sharing equally — keep going!","Think of division as the opposite of multiplication.","Use your times tables to check division answers.","If you know 8×7=56, then 56÷8=7.","Remainders are what's left over after equal sharing.","Divide hundreds the same way — just add zeros.","Check your answer by multiplying back.","Breaking problems into smaller steps helps.","Practice makes permanent — you're doing great!","Division is one of the most used math skills in real life!"];
let questions=[],current=0,correct=0,streak=0,answered=false;
let badges={bronze:false,silver:false,gold:false,plat:false};
function shuffle(a){return[...a].sort(()=>Math.random()-.5)}
function startGame(){
  questions=shuffle(ALL_QUESTIONS).slice(0,60);
  current=0;correct=0;streak=0;
  badges={bronze:false,silver:false,gold:false,plat:false};
  document.getElementById('summary').style.display='none';
  document.getElementById('question-card').classList.remove('hidden');
  document.querySelectorAll('.badge').forEach(b=>b.classList.remove('earned'));
  updateScores();loadQuestion();
}
function loadQuestion(){
  if(current>=questions.length){showSummary();return}
  answered=false;
  const q=questions[current];
  document.getElementById('q-number').textContent=`Question ${current+1} of 60`;
  document.getElementById('q-text').textContent=q.q;
  document.getElementById('progress-fill').style.width=`${(current/60)*100}%`;
  document.getElementById('progress-label').textContent=`${current} / 60`;
  document.getElementById('feedback').textContent='';
  document.getElementById('feedback').className='feedback';
  document.getElementById('btn-next').classList.add('hidden');
  document.getElementById('geno-text').textContent=q.q;
  document.getElementById('geno-status').textContent='🔊 Ready';
  const ad=document.getElementById('answers');ad.innerHTML='';
  shuffle(q.c).forEach(ch=>{
    const btn=document.createElement('button');
    btn.className='ans-btn';btn.textContent=ch;
    btn.onclick=()=>checkAnswer(ch,q.a,btn);
    ad.appendChild(btn);
  });
  checkMilestones();
}
function checkAnswer(chosen,correct_ans,btn){
  if(answered)return;answered=true;
  const isCorrect=chosen===correct_ans;
  const fb=document.getElementById('feedback');
  document.querySelectorAll('.ans-btn').forEach(b=>{b.disabled=true;if(b.textContent===correct_ans)b.classList.add('correct')});
  if(isCorrect){correct++;streak++;btn.classList.add('correct');fb.textContent='✅ Correct! '+coaching[current%coaching.length];fb.className='feedback show-correct';}
  else{streak=0;btn.classList.add('wrong');fb.textContent='❌ The answer is '+correct_ans+'. '+coaching[current%coaching.length];fb.className='feedback show-wrong';}
  current++;updateScores();checkMilestones();
  document.getElementById('btn-next').classList.remove('hidden');
  if(current>=60)document.getElementById('btn-next').textContent='See Results 🏆';
}
function updateScores(){
  document.getElementById('score-correct').textContent=correct;
  document.getElementById('score-streak').textContent=streak;
  document.getElementById('score-total').textContent=current;
}
function checkMilestones(){
  if(current>=15&&!badges.bronze){badges.bronze=true;awardBadge('badge-bronze','Bronze Badge! Great start, Dojo student!')}
  if(current>=30&&!badges.silver){badges.silver=true;awardBadge('badge-silver','Silver Badge! Halfway to Division Master!')}
  if(current>=45&&!badges.gold){badges.gold=true;awardBadge('badge-gold','Gold Badge! Almost a Division Black Belt!')}
  if(current>=60&&!badges.plat){badges.plat=true;awardBadge('badge-plat','Platinum! Division Dojo Black Belt achieved!')}
}
function awardBadge(id,msg){document.getElementById(id).classList.add('earned');genoAnnounce(msg);saveBadges()}
function saveBadges(){localStorage.setItem('gsu_division_badges',JSON.stringify(badges))}
function loadBadges(){
  const s=localStorage.getItem('gsu_division_badges');
  if(s){badges=JSON.parse(s);
    if(badges.bronze)document.getElementById('badge-bronze').classList.add('earned');
    if(badges.silver)document.getElementById('badge-silver').classList.add('earned');
    if(badges.gold)document.getElementById('badge-gold').classList.add('earned');
    if(badges.plat)document.getElementById('badge-plat').classList.add('earned');
  }
}
function showSummary(){
  document.getElementById('question-card').classList.add('hidden');
  document.getElementById('answers').innerHTML='';
  document.getElementById('feedback').textContent='';
  document.getElementById('btn-next').classList.add('hidden');
  const pct=Math.round((correct/60)*100);
  document.getElementById('final-score').textContent=`${correct} / 60 (${pct}%)`;
  const msgs=[[90,'🏆 Division Black Belt! Perfect performance!'],[70,'⭐ Strong work! A few more rounds and you\'ll master it.'],[50,'👍 Good effort! Review your times tables and try again.'],[0,'📚 Keep going! Division gets easier with practice.']];
  document.getElementById('final-msg').textContent=msgs.find(m=>pct>=m[0])[1];
  const bl=document.getElementById('final-badges');bl.innerHTML='';
  if(badges.bronze)bl.innerHTML+='<span style="font-size:2rem">🥉</span>';
  if(badges.silver)bl.innerHTML+='<span style="font-size:2rem">🥈</span>';
  if(badges.gold)bl.innerHTML+='<span style="font-size:2rem">🥇</span>';
  if(badges.plat)bl.innerHTML+='<span style="font-size:2.4rem">💎</span>';
  document.getElementById('summary').style.display='block';
  genoAnnounce(`Division Dojo complete! You scored ${correct} out of 60.`);
}
function nextQuestion(){loadQuestion()}
function restartGame(){startGame()}
function genoSpeak(){speakText(document.getElementById('geno-text').textContent)}
function genoAnnounce(text){document.getElementById('geno-text').textContent=text;speakText(text)}
function speakText(text){
  if(!('speechSynthesis' in window))return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.rate=0.95;u.pitch=1.05;
  document.getElementById('geno-status').textContent='🔊 Speaking…';
  u.onend=()=>{document.getElementById('geno-status').textContent='🔊 Ready'};
  window.speechSynthesis.speak(u);
}
loadBadges();startGame();
</script>
</body>
</html>
