<!-- ══════════════════════════════════════════════════════════════════
     AIO CONTENT RULES — APPLY TO EVERY PAGE
     These are IN-PAGE content guidelines, not code.
     Implement in the Webflow page designer.
     ══════════════════════════════════════════════════════════════════

  RULE 1 — QUESTION-FORMAT H2/H3 HEADINGS
    Every H2 and H3 on the page should be a question Google would
    actually search for. Examples:
      ✓  "How does financial literacy help adults get out of debt?"
      ✓  "What is the Comprehension Bridge?"
      ✗  "Our Approach to Learning"
      ✗  "Why GSU"

  RULE 2 — 40-60 WORD DIRECT ANSWER PARAGRAPHS
    The FIRST paragraph under each question-heading must answer
    the question directly in 40-60 words. Google pulls this into AIO.
    Start with the answer — not background or context.
      ✓  "The Comprehension Bridge is a free AI-guided reading program..."
      ✗  "At GSU, we believe that reading is the foundation of all learning..."

  RULE 3 — ADD class="speakable" TO KEY PARAGRAPHS
    Add the CSS class "speakable" to your most important answer
    paragraphs. This matches the speakable schema selector and tells
    Google these sections are suitable for voice/AI reading.

  RULE 4 — STATISTICS WITH CONTEXT
    AIO loves specific, cited statistics. Keep the ones already on
    your pages (46% of adults read zero books, etc.) and frame them
    as answers to questions.

  RULE 5 — INTERNAL LINKING
    Every hub page should link to at least 3 other hub pages.
    Use descriptive anchor text that includes keywords:
      ✓  "Learn more about financial literacy for adults"
      ✗  "Click here"

  RULE 6 — PAGE SPEED
    AIO and Ad Grant quality scores both favor fast pages.
    In Webflow: compress all images, use WebP format,
    minimize custom code embeds above the fold.

  ══════════════════════════════════════════════════════════════════ -->
