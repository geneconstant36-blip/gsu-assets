<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Sovereign Campus — Global Sovereign University</title>
  <meta name="description" content="Walk the Sovereign Campus. No headset required. Browser-native WebXR.">
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aframe-extras@7.1.0/dist/aframe-extras.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Georgia, serif; background: #000; overflow: hidden; }
    #loading-screen {
      position: fixed; inset: 0; background: #000;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 999; color: #C9A84C;
    }
    #loading-screen h1 { font-size: 28px; letter-spacing: .04em; margin-bottom: 8px; }
    #loading-screen p { font-size: 14px; color: rgba(201,168,76,.6); margin-bottom: 32px; }
    .loading-bar { width: 240px; height: 2px; background: rgba(201,168,76,.2); border-radius: 1px; }
    .loading-fill { height: 100%; background: #C9A84C; border-radius: 1px; animation: fill 2s ease forwards; }
    @keyframes fill { from { width: 0 } to { width: 100% } }
    #hud {
      position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,.75); border: 0.5px solid rgba(201,168,76,.3);
      border-radius: 8px; padding: 8px 16px;
      display: flex; align-items: center; gap: 16px;
      z-index: 100; font-family: Georgia, serif;
    }
    #hud .room-label { font-size: 13px; color: #C9A84C; }
    #hud .sep { color: rgba(201,168,76,.3); }
    #hud .hint { font-size: 11px; color: rgba(255,255,255,.4); }
    #geno-panel {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,.85); border: 0.5px solid rgba(201,168,76,.4);
      border-radius: 12px; padding: 12px 20px; max-width: 480px; width: 90%;
      z-index: 100; display: none;
    }
    #geno-panel .geno-label { font-size: 10px; color: #C9A84C; letter-spacing: .08em; text-transform: uppercase; margin-bottom: 6px; }
    #geno-panel .geno-text { font-size: 14px; color: rgba(255,255,255,.85); line-height: 1.6; }
    #geno-panel .geno-close { position: absolute; top: 8px; right: 12px; color: rgba(201,168,76,.5); cursor: pointer; font-size: 16px; background: none; border: none; }
    #enter-btn {
      position: fixed; bottom: 24px; right: 24px;
      background: #C9A84C; color: #000; border: none;
      border-radius: 8px; padding: 10px 20px; font-size: 13px;
      font-family: Georgia, serif; cursor: pointer; z-index: 100;
    }
  </style>
</head>
<body>

<div id="loading-screen">
  <h1>Global Sovereign University</h1>
  <p>The Sovereign Campus · WebXR · No headset required</p>
  <div class="loading-bar"><div class="loading-fill"></div></div>
</div>

<div id="hud" style="display:none">
  <span class="room-label" id="room-label">The Quad</span>
  <span class="sep">·</span>
  <span class="hint" id="device-hint">WASD to move · Mouse to look</span>
</div>

<div id="geno-panel">
  <button class="geno-close" onclick="closeGeno()">✕</button>
  <div class="geno-label">GENO — Your Guide</div>
  <div class="geno-text" id="geno-text"></div>
</div>

<button id="enter-btn" onclick="enterVR()">Enter VR</button>

<a-scene
  id="campus-scene"
  loading-screen="enabled: false"
  fog="type: linear; color: #0a0a0a; near: 20; far: 80"
  renderer="antialias: true; colorManagement: true"
  vr-mode-ui="enabled: true">

  <!-- Assets -->
  <a-assets>
    <a-mixin id="gold-text"
      text="color: #C9A84C; font: kelsonsans; align: center; width: 4"
      geometry="primitive: plane; width: 4.5; height: .8"
      material="color: #000; opacity: 0.7; side: double">
    </a-mixin>
  </a-assets>

  <!-- Sky -->
  <a-sky color="#0a0608"></a-sky>

  <!-- Ground — black marble -->
  <a-plane
    position="0 0 0" rotation="-90 0 0"
    width="120" height="120"
    material="color: #050505; roughness: 0.1; metalness: 0.4"
    shadow="receive: true">
  </a-plane>

  <!-- Gold grid lines on ground -->
  <a-entity id="grid-lines"></a-entity>

  <!-- ═══════════════════════════════════════════
       THE QUAD — Entry Plaza
  ═══════════════════════════════════════════ -->
  <a-entity id="quad" position="0 0 0">

    <!-- GSU Crest pedestal -->
    <a-cylinder position="0 0.5 -8" radius="2" height="1"
      material="color: #111; roughness: 0.3; metalness: 0.6" shadow="cast: true">
    </a-cylinder>
    <a-cylinder position="0 1.2 -8" radius="1.6" height="0.4"
      material="color: #C9A84C; roughness: 0.2; metalness: 0.8" shadow="cast: true">
    </a-cylinder>
    <a-text value="GSU" position="0 2.2 -8" color="#C9A84C"
      font="kelsonsans" align="center" width="6" side="double">
    </a-text>
    <a-text value="Global Sovereign University" position="0 1.8 -7.9"
      color="rgba(201,168,76,0.6)" align="center" width="5" side="double">
    </a-text>

    <!-- Five archway doors around the plaza -->

    <!-- Door 1: Library (North) -->
    <a-entity id="door-library" position="0 0 -20"
      class="room-door" data-room="library"
      data-geno="Welcome to The Library. Every book Gene has written lives on these shelves. Walk toward any spine. I will introduce it to you.">
      <a-box position="0 3 0" width="5" height="6" depth="0.3"
        material="color: #0a0a0a; roughness: 0.5" shadow="cast: true">
      </a-box>
      <a-box position="-2.5 3 0" width="0.4" height="6.5" depth="0.4"
        material="color: #1a1208; roughness: 0.4" shadow="cast: true">
      </a-box>
      <a-box position="2.5 3 0" width="0.4" height="6.5" depth="0.4"
        material="color: #1a1208; roughness: 0.4" shadow="cast: true">
      </a-box>
      <a-box position="0 6.3 0" width="5.8" height="0.4" depth="0.4"
        material="color: #C9A84C; roughness: 0.2; metalness: 0.8" shadow="cast: true">
      </a-box>
      <a-text value="THE LIBRARY" position="0 5.5 0.2"
        color="#C9A84C" align="center" width="4" side="double">
      </a-text>
      <a-text value="177 Books · GENO Guides" position="0 4.9 0.2"
        color="rgba(201,168,76,0.5)" align="center" width="3.5" side="double">
      </a-text>
      <!-- Gold glow plane inside arch -->
      <a-plane position="0 3 0.1" width="4.6" height="5.8"
        material="color: #C9A84C; opacity: 0.04; side: double">
      </a-plane>
      <!-- Proximity trigger zone -->
      <a-box position="0 1 2" width="5" height="3" depth="4"
        material="opacity: 0; transparent: true"
        class="proximity-trigger" data-room="library">
      </a-box>
    </a-entity>

    <!-- Door 2: Wisdom Bridge (NE) -->
    <a-entity id="door-bridge" position="16 0 -14"
      rotation="0 -40 0"
      class="room-door" data-room="bridge"
      data-geno="The Wisdom Bridge. Every chapter you complete adds a plank. Turn around and look — the bridge behind you is the distance you have already traveled.">
      <a-box position="0 3 0" width="5" height="6" depth="0.3"
        material="color: #0a0a0a; roughness: 0.5" shadow="cast: true">
      </a-box>
      <a-box position="-2.5 3 0" width="0.4" height="6.5" depth="0.4"
        material="color: #1a1208; roughness: 0.4" shadow="cast: true">
      </a-box>
      <a-box position="2.5 3 0" width="0.4" height="6.5" depth="0.4"
        material="color: #1a1208; roughness: 0.4" shadow="cast: true">
      </a-box>
      <a-box position="0 6.3 0" width="5.8" height="0.4" depth="0.4"
        material="color: #C9A84C; roughness: 0.2; metalness: 0.8" shadow="cast: true">
      </a-box>
      <a-text value="WISDOM BRIDGE" position="0 5.5 0.2"
        color="#C9A84C" align="center" width="4" side="double">
      </a-text>
      <a-text value="Your progress · Visualized" position="0 4.9 0.2"
        color="rgba(201,168,76,0.5)" align="center" width="3.5" side="double">
      </a-text>
      <a-plane position="0 3 0.1" width="4.6" height="5.8"
        material="color: #C9A84C; opacity: 0.04; side: double">
      </a-plane>
    </a-entity>

    <!-- Door 3: Hall of Forgotten (NW) -->
    <a-entity id="door-hall" position="-16 0 -14"
      rotation="0 40 0"
      class="room-door" data-room="hall"
      data-geno="The Hall of the Forgotten. This room contains the statistics the system would prefer you never see. Walk through them. Let the numbers become real.">
      <a-box position="0 3 0" width="5" height="6" depth="0.3"
        material="color: #0a0a0a; roughness: 0.5" shadow="cast: true">
      </a-box>
      <a-box position="-2.5 3 0" width="0.4" height="6.5" depth="0.4"
        material="color: #1a1208; roughness: 0.4" shadow="cast: true">
      </a-box>
      <a-box position="2.5 3 0" width="0.4" height="6.5" depth="0.4"
        material="color: #1a1208; roughness: 0.4" shadow="cast: true">
      </a-box>
      <a-box position="0 6.3 0" width="5.8" height="0.4" depth="0.4"
        material="color: #C9A84C; roughness: 0.2; metalness: 0.8" shadow="cast: true">
      </a-box>
      <a-text value="HALL OF THE FORGOTTEN" position="0 5.5 0.2"
        color="#C9A84C" align="center" width="5" side="double">
      </a-text>
      <a-text value="The statistics the system hides" position="0 4.9 0.2"
        color="rgba(201,168,76,0.5)" align="center" width="3.5" side="double">
      </a-text>
      <a-plane position="0 3 0.1" width="4.6" height="5.8"
        material="color: #500; opacity: 0.05; side: double">
      </a-plane>
    </a-entity>

    <!-- Door 4: Game Arena (East) -->
    <a-entity id="door-arena" position="20 0 0"
      rotation="0 -90 0"
      class="room-door" data-room="arena"
      data-geno="The Game Arena. Every BookGame lives behind these doors. Your progress glows gold on the door you have already entered. New doors remain white.">
      <a-box position="0 3 0" width="5" height="6" depth="0.3"
        material="color: #0a0a0a; roughness: 0.5" shadow="cast: true">
      </a-box>
      <a-box position="-2.5 3 0" width="0.4" height="6.5" depth="0.4"
        material="color: #1a1208; roughness: 0.4" shadow="cast: true">
      </a-box>
      <a-box position="2.5 3 0" width="0.4" height="6.5" depth="0.4"
        material="color: #1a1208; roughness: 0.4" shadow="cast: true">
      </a-box>
      <a-box position="0 6.3 0" width="5.8" height="0.4" depth="0.4"
        material="color: #C9A84C; roughness: 0.2; metalness: 0.8" shadow="cast: true">
      </a-box>
      <a-text value="THE GAME ARENA" position="0 5.5 0.2"
        color="#C9A84C" align="center" width="4" side="double">
      </a-text>
      <a-text value="All BookGames · All subjects" position="0 4.9 0.2"
        color="rgba(201,168,76,0.5)" align="center" width="3.5" side="double">
      </a-text>
      <a-plane position="0 3 0.1" width="4.6" height="5.8"
        material="color: #C9A84C; opacity: 0.04; side: double">
      </a-plane>
    </a-entity>

    <!-- Door 5: Civilization Commons (West) -->
    <a-entity id="door-commons" position="-20 0 0"
      rotation="0 90 0"
      class="room-door" data-room="commons"
      data-geno="The Civilization Builders Commons. Mentors and learners meet here. A Eugene veteran across a table from a Lagos entrepreneur. The exchange the system never built.">
      <a-box position="0 3 0" width="5" height="6" depth="0.3"
        material="color: #0a0a0a; roughness: 0.5" shadow="cast: true">
      </a-box>
      <a-box position="-2.5 3 0" width="0.4" height="6.5" depth="0.4"
        material="color: #1a1208; roughness: 0.4" shadow="cast: true">
      </a-box>
      <a-box position="2.5 3 0" width="0.4" height="6.5" depth="0.4"
        material="color: #1a1208; roughness: 0.4" shadow="cast: true">
      </a-box>
      <a-box position="0 6.3 0" width="5.8" height="0.4" depth="0.4"
        material="color: #C9A84C; roughness: 0.2; metalness: 0.8" shadow="cast: true">
      </a-box>
      <a-text value="CIVILIZATION BUILDERS" position="0 5.5 0.2"
        color="#C9A84C" align="center" width="4" side="double">
      </a-text>
      <a-text value="Commons · Mentor network" position="0 4.9 0.2"
        color="rgba(201,168,76,0.5)" align="center" width="3.5" side="double">
      </a-text>
      <a-plane position="0 3 0.1" width="4.6" height="5.8"
        material="color: #C9A84C; opacity: 0.04; side: double">
      </a-plane>
    </a-entity>

    <!-- Ambient torches / light pillars -->
    <a-cylinder position="8 2 -8" radius="0.15" height="4"
      material="color: #1a1208; roughness: 0.5" shadow="cast: true">
    </a-cylinder>
    <a-sphere position="8 4.2 -8" radius="0.3"
      material="color: #C9A84C; emissive: #C9A84C; emissiveIntensity: 0.8">
    </a-sphere>
    <a-light type="point" position="8 4.5 -8" color="#C9A84C" intensity="0.4" distance="12"></a-light>

    <a-cylinder position="-8 2 -8" radius="0.15" height="4"
      material="color: #1a1208; roughness: 0.5" shadow="cast: true">
    </a-cylinder>
    <a-sphere position="-8 4.2 -8" radius="0.3"
      material="color: #C9A84C; emissive: #C9A84C; emissiveIntensity: 0.8">
    </a-sphere>
    <a-light type="point" position="-8 4.5 -8" color="#C9A84C" intensity="0.4" distance="12"></a-light>

  </a-entity>

  <!-- ═══════════════════════════════════════════
       LIGHTING
  ═══════════════════════════════════════════ -->
  <a-light type="ambient" color="#0a0608" intensity="0.5"></a-light>
  <a-light type="directional" position="10 20 5" color="#C9A84C" intensity="0.2" castShadow="true"></a-light>
  <a-light type="point" position="0 8 -8" color="#C9A84C" intensity="0.6" distance="30"></a-light>

  <!-- ═══════════════════════════════════════════
       PLAYER
  ═══════════════════════════════════════════ -->
  <a-entity id="player"
    position="0 1.6 8"
    movement-controls="fly: false; speed: 0.15; constrainToNavMesh: false"
    look-controls="pointerLockEnabled: true">
    <a-camera
      id="camera"
      look-controls="pointerLockEnabled: true"
      wasd-controls="acceleration: 25"
      near="0.1" far="100">
      <!-- Crosshair -->
      <a-cursor
        color="#C9A84C"
        opacity="0.6"
        raycaster="objects: .room-door, .proximity-trigger; far: 8">
      </a-cursor>
    </a-camera>
  </a-entity>

</a-scene>

<script>
/* ── Loading screen ── */
setTimeout(()=>{
  document.getElementById('loading-screen').style.display='none';
  document.getElementById('hud').style.display='flex';
  showGeno("Welcome to the Sovereign Campus. This is a free university. Walk toward any door. I will guide you. Use WASD to move and your mouse to look around.");
  detectDevice();
},2500);

function detectDevice(){
  const hint=document.getElementById('device-hint');
  if(/Mobi|Android|iPhone/i.test(navigator.userAgent)){
    hint.textContent='Move your phone to look around · Tap to interact';
  } else {
    hint.textContent='WASD to move · Mouse to look · Click to lock cursor';
  }
}

/* ── GENO panel ── */
function showGeno(text){
  const panel=document.getElementById('geno-panel');
  document.getElementById('geno-text').textContent=text;
  panel.style.display='block';
}
function closeGeno(){
  document.getElementById('geno-panel').style.display='none';
}

/* ── Room door proximity ── */
const ROOM_LABELS={
  library:'The Library',
  bridge:'Wisdom Bridge',
  hall:'Hall of the Forgotten',
  arena:'The Game Arena',
  commons:'Civilization Builders Commons'
};
const ROOM_URLS={
  library:'https://globalsovereignuniversity.org/campus/library',
  bridge:'https://globalsovereignuniversity.org/campus/bridge',
  hall:'https://globalsovereignuniversity.org/campus/hall',
  arena:'https://globalsovereignuniversity.org/campus/arena',
  commons:'https://globalsovereignuniversity.org/campus/commons'
};

let lastRoom=null;
document.querySelectorAll('.room-door').forEach(door=>{
  door.addEventListener('mouseenter',()=>{
    const room=door.getAttribute('data-room');
    if(room===lastRoom) return;
    lastRoom=room;
    document.getElementById('room-label').textContent=ROOM_LABELS[room]||'The Quad';
    const geno=door.getAttribute('data-geno');
    if(geno) showGeno(geno);
  });
  door.addEventListener('click',()=>{
    const room=door.getAttribute('data-room');
    if(ROOM_URLS[room]){
      window.location.href=ROOM_URLS[room];
    }
  });
});

/* ── VR mode ── */
function enterVR(){
  document.getElementById('campus-scene').enterVR();
}

/* ── Reset room label when looking away ── */
setInterval(()=>{
  // Could add raycast-based room detection here
},2000);
</script>

</body>
</html>
