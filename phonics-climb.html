async function saveScore(score,tier){
  if(!db||!uid) return;
  try{
    const prevBest = best && best.bestScore ? best.bestScore : 0;
    if(score>=prevBest){
      best={bestScore:score,bestTier:tier,updatedAt:Date.now()};

/* ===== 52 QUESTIONS · grounded in "The Code That Unlocks Reading: Phonics" ===== */
const QUESTIONS=[
 // BRONZE — the alphabetic principle, sounds vs. letter names, CVC, blending

 {t:'Bronze',q:'Reading the word "cat" correctly means thinking:',o:['the letter names c–a–t','the sounds /k/ /a/ /t/','the picture of a cat'],a:1,why:'Reading is /k/ /a/ /t/ — <b>sounds</b>, not letter names.'},
 {t:'Bronze',q:'In "cat," the letter "a" says…',o:['its name, "ay"','the short sound /a/, as in apple','nothing'],a:1,why:'Here "a" is the short vowel <b>/a/</b>. Letter names ≠ letter sounds.'},

 {t:'Bronze',q:'Phonemic awareness (Book 1) is hearing sounds. Phonics adds…',o:['letters and print','numbers','pictures'],a:0,why:'Phonics connects those sounds to <b>letters/print</b>.'},
 {t:'Bronze',q:'"Sound it out" should mean saying the…',o:['letter names','sounds','word shape'],a:1,why:'Say the <b>sounds</b>, then blend — not the names.'},

 {t:'Silver',q:'How many phonemes does "tch" in "match" represent?',o:['one','three','two'],a:0,why:'"tch" is three letters but <b>one</b> phoneme: /ch/.'},
 {t:'Silver',q:'"igh" in "night" is a grapheme of how many letters?',o:['two','three','four'],a:1,why:'"igh" is a <b>three</b>-letter grapheme for the long /ī/ sound.'},

 {t:'Silver',q:'In the word "box," the letter x represents…',o:['one phoneme','two phonemes /k/ /s/','no sound'],a:1,why:'x = <b>/k/ /s/</b>, two phonemes. A learnable pattern, not chaos.'},
 {t:'Silver',q:'Reading travels: letters/graphemes → phonemes → spoken word →',o:['meaning','spelling','guessing'],a:0,why:'Reading ends at <b>meaning</b>.'},

 {t:'Silver',q:'A child reads "cat" but spells it "kat." This learner has…',o:['failed phonics','grasped the principle (now learning conventions)','memorized a picture'],a:1,why:'They <b>grasped the principle</b> — sounds can be letters — and are learning English spelling choices.'},

 {t:'Silver',q:'Which of these is a consonant digraph?',o:['bl','sh','st'],a:1,why:'<b>sh</b> is a digraph; bl and st are blends (each letter keeps its sound).'},

 // GOLD — synthetic vs analytic, /k/ spellings, controlled text, silent e
 {t:'Gold',q:'Synthetic phonics builds…',o:['from small units up (blend sounds)','from whole words down','from pictures'],a:0,why:'Synthetic = synthesize: connect graphemes to phonemes, then <b>blend up</b>.'},
 {t:'Gold',q:'Analytic phonics starts with…',o:['single letters','whole words you already know','random text'],a:1,why:'Analytic starts with <b>known whole words</b> and breaks them down to find patterns.'},
 {t:'Gold',q:'For beginners and struggling adults, the stronger starting approach is…',o:['analytic','synthetic','neither'],a:1,why:'<b>Synthetic</b> makes the code visible from day one instead of asking learners to infer it.'},
 {t:'Gold',q:'"Controlled text" means reading material built mostly from…',o:['the correspondences already taught','random hard words','sight words only'],a:0,why:'Controlled text uses <b>taught correspondences</b> — alignment is everything.'},
 {t:'Gold',q:'/k/ before e, i, or y is usually spelled…',o:['c','k','ck'],a:1,why:'<b>k</b> before e/i/y: kit, kept, sky.'},
 {t:'Gold',q:'/k/ before a, o, or u is usually spelled…',o:['k','c','ch'],a:1,why:'<b>c</b> before a/o/u: cat, cot, cut.'},
 {t:'Gold',q:'/k/ right after a short vowel in a one-syllable word is often spelled…',o:['ck','ch','que'],a:0,why:'<b>ck</b>: back, neck, sick, rock.'},
 {t:'Gold',q:'The silent e in "cape" makes the vowel…',o:['say its name (long)','short','silent'],a:0,why:'Silent e often makes the vowel <b>say its name</b>: cap → cape.'},
 {t:'Gold',q:'Analytic phonics works best as a…',o:['first stage','later stage, after the code is secure','replacement for phonics'],a:1,why:'It\u2019s a powerful <b>second lens</b> once you can already decode.'},
 {t:'Gold',q:'If synthetic phonics is the steering wheel, analytic phonics is the…',o:['map','engine','brakes'],a:0,why:'Synthetic gives control (steering); analytic is the <b>map</b> of how patterns are organized.'},
 {t:'Gold',q:'Phonics is not in conflict with comprehension because it removes a…',o:['rule','bottleneck','vowel'],a:1,why:'Accurate, automatic word recognition removes the decoding <b>bottleneck</b>, freeing attention for meaning.'},
 {t:'Gold',q:'The word family "-ight" appears in light, night, and…',o:['bite','bright','bit'],a:1,why:'<b>bright</b> — same "-ight" chunk.'},
 {t:'Gold',q:'Precise feedback ("that\u2019s a vowel team") instead of "try again" reduces…',o:['speed','shame','accuracy'],a:1,why:'Precision turns a mistake into information, which reduces <b>shame</b>.'},
 // PLATINUM — orthographic mapping, ti=/sh/, predictability, history, theory
 {t:'Platinum',q:'Linnea Ehri\u2019s term for bonding a word\u2019s spelling to its pronunciation and meaning is…',o:['orthographic mapping','sight memorizing','visual recall'],a:0,why:'<b>Orthographic mapping</b> is how decoded words become instant "sight" words.'},

 {t:'Platinum',q:'The "ti = /sh/" pattern tends to appear in words of which origin?',o:['Anglo-Saxon','Latin','Norse'],a:1,why:'It comes from <b>Latin</b> roots — history leaves learnable patterns.'},
 {t:'Platinum',q:'English spelling is often cited as roughly how predictable?',o:['about 50%','about 84%','100%'],a:1,why:'About <b>84%</b> — most words are decodable if you know the patterns and their conditions.'},
 {t:'Platinum',q:'True "irregularity" in English is concentrated in a small number of…',o:['high-frequency words','long words','foreign words'],a:0,why:'A relatively small set of <b>high-frequency</b> words carries most of the irregularity.'},
 {t:'Platinum',q:'In Mark Seidenberg\u2019s view, the reading brain is a…',o:['memorizing machine','pattern-learning machine','guessing machine'],a:1,why:'A <b>pattern-learning machine</b> that extracts regularities from clear, repeated print.'},
 {t:'Platinum',q:'That pattern-learning brain can only extract regularities it is exposed to…',o:['clearly and repeatedly','occasionally','through pictures'],a:0,why:'It needs <b>clear, repeated</b> input — which is why guessing-based instruction leaves patterns blurry.'},

 {t:'Platinum',q:'Why is phonics called the "fairest" reading instruction?',o:['it relies on a rich home environment','it makes the code explicit for every learner','it is the fastest'],a:1,why:'It makes the code <b>explicit for all</b>, not just for kids who infer it on their own.'},
 {t:'Platinum',q:'A decoder reads "national" as "nation" plus the suffix…',o:['-tion','-al','-ity'],a:1,why:'nation + <b>-al</b>. Seeing meaningful parts is how long words get unlocked.'}

const app=document.getElementById('app');
let order=[], idx=0, score=0;

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function buildOrder(){
  // shuffle within each tier, keep Bronze→Platinum ramp
  const tiers=['Bronze','Silver','Gold','Platinum']; let o=[];
  tiers.forEach(t=>{ o=o.concat(shuffle(QUESTIONS.filter(q=>q.t===t))); });
  return o;
}

function renderStart(){
  const bestLine = best && best.bestScore!=null
    ? `<p class="best">Your best climb: <b>${best.bestScore}/52</b> — ${best.bestTier||''}</p>` : '';
  app.innerHTML=`
    <div class="center">
      <div class="medals">
        <span class="medal">🥉 Bronze</span><span class="medal">🥈 Silver</span>
        <span class="medal">🥇 Gold</span><span class="medal">💎 Platinum</span>
      </div>
      <p style="color:var(--muted);margin-bottom:22px;max-width:44ch;margin-left:auto;margin-right:auto;">
        Thirteen questions per tier, drawn from <i>The Code That Unlocks Reading</i>. Fresh order every climb. Answer to see why.
      </p>
      <button class="btn" id="startBtn">Start the Climb →</button>
      ${bestLine}
    </div>`;
  document.getElementById('startBtn').addEventListener('click',start);
}

function start(){ order=buildOrder(); idx=0; score=0; renderQ(); }

function renderQ(){
  const item=order[idx];
  const pct=Math.round((idx/order.length)*100);
  app.innerHTML=`
    <div class="barwrap"><div class="bar" style="width:${pct}%"></div></div>
    <div class="meta"><span class="tier ${item.t.toLowerCase()}">${item.t} Tier</span><span>Question ${idx+1} / ${order.length} · Score ${score}</span></div>
    <div class="q">${item.q}</div>
    <div class="opts" id="opts"></div>
    <div class="fb" id="fb"></div>
    <button class="next" id="nextBtn"></button>`;
  const opts=document.getElementById('opts');
  item.o.forEach((text,i)=>{
    const b=document.createElement('button');
    b.className='opt'; b.textContent=text;
    b.addEventListener('click',()=>choose(i));
    opts.appendChild(b);
  });
}

function choose(i){
  const item=order[idx];
  const buttons=[...document.querySelectorAll('.opt')];
  buttons.forEach(b=>b.disabled=true);
  const correct = i===item.a;
  if(correct) score++;
  buttons[item.a].classList.add('correct');
  if(!correct) buttons[i].classList.add('wrong');
  const fb=document.getElementById('fb');
  fb.className='fb show '+(correct?'ok':'no');
  fb.innerHTML=(correct?'✓ Correct. ':'✗ Not quite. ')+item.why;
  const nb=document.getElementById('nextBtn');
  nb.className='next show';
  nb.textContent = idx+1<order.length ? 'Next →' : 'See your result →';
  nb.addEventListener('click',()=>{ idx++; idx<order.length?renderQ():finish(); });
}

function tierFor(s){
  if(s>=47) return {name:'Platinum',cls:'platinum',icon:'💎',msg:'A near-perfect climb. You own the code.'};
  if(s>=39) return {name:'Gold',cls:'gold',icon:'🥇',msg:'Strong mastery of the phonics code.'};
  if(s>=27) return {name:'Silver',cls:'silver',icon:'🥈',msg:'Solid. The system is taking hold.'};
  if(s>=13) return {name:'Bronze',cls:'bronze',icon:'🥉',msg:'You got through — the foundation is set.'};
  return {name:'Keep Climbing',cls:'bronze',icon:'⛰️',msg:'Run it again — every climb maps the code deeper.'};
}

function finish(){
  const tr=tierFor(score);
  saveScore(score,tr.name);
  app.innerHTML=`
    <div class="center">
      <div style="font-size:2.6rem">${tr.icon}</div>
      <div class="tierbadge tier ${tr.cls}">${tr.name}</div>
      <div class="scorebig">${score}<span style="font-size:1.4rem;color:var(--muted)"> / 52</span></div>
      <p style="color:var(--muted);margin:14px auto 0;max-width:42ch;">${tr.msg}</p>
      <div class="medals" style="margin-top:22px;">
        <span class="medal ${score>=13?'on':''}">🥉 Bronze</span>
        <span class="medal ${score>=27?'on':''}">🥈 Silver</span>
        <span class="medal ${score>=39?'on':''}">🥇 Gold</span>
        <span class="medal ${score>=47?'on':''}">💎 Platinum</span>
      </div>
      <p style="margin-top:18px;"><button class="btn" id="again">Climb Again →</button></p>
      <p style="margin-top:14px;"><a href="https://www.globalsovereignuniversity.org/readification">← Back to Readification</a></p>
    </div>`;
  document.getElementById('again').addEventListener('click',start);
}
