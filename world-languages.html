*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:linear-gradient(135deg,#0f172a,#1e293b);color:#fff;min-height:100vh}
.wrap{max-width:940px;margin:0 auto;padding:20px}
.hdr{text-align:center;padding:15px 0 20px}
.hdr h1{font-size:1.8rem;font-weight:900;margin-bottom:4px}
.hdr h1 span{color:#38bdf8}
.hdr p{color:#94a3b8;font-size:.95rem}
.geno{display:flex;align-items:center;gap:12px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:14px;padding:14px;margin-bottom:20px}
.geno img{width:50px;height:50px;border-radius:50%;border:2px solid #38bdf8}
.geno-msg{flex:1;color:#cbd5e1;font-size:.9rem;line-height:1.5}
.geno-msg b{color:#38bdf8}
.vbtn{width:36px;height:36px;border-radius:50%;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.04);color:#38bdf8;cursor:pointer;font-size:1rem;flex-shrink:0}
.vbtn.off{opacity:.4}
.lpick{margin-bottom:20px}
.lpick-label{color:#94a3b8;font-size:.8rem;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;text-align:center}
.langs{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
.lang{padding:10px 16px;border-radius:10px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);color:#94a3b8;font-size:.85rem;font-weight:600;cursor:pointer;transition:all .2s;text-align:center;min-width:90px}
.lang:hover{border-color:rgba(56,189,248,.3);color:#38bdf8}
.lang.on{background:rgba(56,189,248,.12);border-color:#38bdf8;color:#38bdf8;box-shadow:0 2px 12px rgba(56,189,248,.15)}
.lang .flag{font-size:1.3rem;display:block;margin-bottom:2px}
.cats{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-bottom:18px}
.cat{padding:8px 14px;border-radius:8px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);color:#94a3b8;font-size:.78rem;font-weight:600;cursor:pointer;transition:all .2s}
.cat:hover{color:#38bdf8;border-color:rgba(56,189,248,.2)}
.cat.on{background:rgba(56,189,248,.1);border-color:#38bdf8;color:#38bdf8}
.stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-bottom:16px}
.stat{text-align:center;padding:6px 18px;background:rgba(255,255,255,.04);border-radius:8px}
.stat-v{font-size:1.3rem;font-weight:800;color:#38bdf8}
.stat-l{font-size:.6rem;color:#64748b;text-transform:uppercase;letter-spacing:1px}
.badges{display:flex;gap:12px;justify-content:center;margin-bottom:18px}
.badge{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.3rem;opacity:.25;transition:all .4s}
.badge.on{opacity:1;transform:scale(1.1)}
.b-br{background:linear-gradient(135deg,#cd7f32,#8b4513)}
.b-si{background:linear-gradient(135deg,#c0c0c0,#808080)}
.b-go{background:linear-gradient(135deg,#ffd700,#daa520)}
.b-pl{background:linear-gradient(135deg,#e5e4e2,#a0a0a0)}
.arena{background:rgba(0,0,0,.25);border:1px solid rgba(255,255,255,.1);border-radius:14px;padding:20px;margin-bottom:16px}
.prompt{text-align:center;margin-bottom:16px}
.prompt-word{font-size:1.8rem;font-weight:800;color:#38bdf8;margin-bottom:4px;line-height:1.3}
.prompt-rom{font-size:1rem;color:#64748b;font-style:italic;margin-bottom:4px}
.prompt-hint{font-size:.8rem;color:#475569}
.hear-btn{display:inline-flex;align-items:center;gap:6px;padding:10px 24px;border-radius:50px;background:rgba(56,189,248,.12);border:1px solid rgba(56,189,248,.3);color:#38bdf8;font-size:.9rem;font-weight:600;cursor:pointer;margin:10px 0}
.hear-btn:hover{background:rgba(56,189,248,.2)}
.opts{display:grid;grid-template-columns:1fr 1fr;gap:10px;max-width:600px;margin:0 auto}
@media(max-width:500px){.opts{grid-template-columns:1fr}}
.opt{padding:14px 16px;border-radius:10px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);color:#fff;font-size:1rem;cursor:pointer;transition:all .2s;text-align:center;font-weight:500}
.opt:hover{border-color:#38bdf8;background:rgba(56,189,248,.08)}
.opt.cor{background:rgba(74,222,128,.2);border-color:#4ade80;color:#4ade80}
.opt.wr{background:rgba(239,68,68,.2);border-color:#ef4444;color:#ef4444}
.fb{text-align:center;font-size:.85rem;font-weight:600;margin-top:10px;min-height:20px}

.nxt:hover{background:rgba(56,189,248,.2)}
.dict-bar{text-align:center;margin-bottom:16px}
.dict-btn{padding:10px 24px;border-radius:10px;background:rgba(255,215,0,.1);border:1px solid rgba(255,215,0,.3);color:#ffd700;font-size:.9rem;font-weight:600;cursor:pointer}
.dict-btn:hover{background:rgba(255,215,0,.15)}
.dict-modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.85);z-index:1000;overflow-y:auto;padding:20px}
.dict-inner{max-width:700px;margin:0 auto;background:#1e293b;border:1px solid rgba(255,255,255,.1);border-radius:14px;padding:25px}
.dict-close{float:right;background:none;border:1px solid rgba(255,255,255,.2);color:#fff;padding:6px 14px;border-radius:8px;cursor:pointer;font-size:.9rem}
.dict-close:hover{background:rgba(255,255,255,.1)}
.dict-title{font-size:1.4rem;color:#38bdf8;font-weight:700;margin-bottom:15px}
.dict-cat{color:#ffd700;font-weight:700;font-size:1rem;margin:12px 0 6px;border-bottom:1px solid rgba(255,255,255,.1);padding-bottom:4px}

.wcount{text-align:center;color:#64748b;font-size:.8rem;margin-bottom:12px}

/* ===== ENGINE ===== */
var vo=true,sy=window.speechSynthesis,cor=0,str=0,tot=0;
var curLang='es',curCat=null,answered=false;

function say(t,lang){
  document.getElementById('gT').textContent=t;
  if(vo&&sy){sy.cancel();var u=new SpeechSynthesisUtterance(t);
  var code=lang?LANGS[lang].code:'en-US';
  u.lang=code;u.rate=lang?0.8:0.95;u.pitch=1;u.volume=0.8;
  var v=sy.getVoices(),p=v.find(function(x){return x.lang===code})||v.find(function(x){return x.lang.startsWith(code.split('-')[0])});
  if(p)u.voice=p;sy.speak(u)}
}
function sayWord(text){
  if(vo&&sy){sy.cancel();var u=new SpeechSynthesisUtterance(text);
  var code=LANGS[curLang].code;u.lang=code;u.rate=0.7;u.pitch=1;u.volume=0.9;
  var v=sy.getVoices(),p=v.find(function(x){return x.lang===code})||v.find(function(x){return x.lang.startsWith(code.split('-')[0])});
  if(p)u.voice=p;sy.speak(u)}
}
function togV(){vo=!vo;document.getElementById('vBtn').textContent=vo?'🔊':'🔇';document.getElementById('vBtn').classList.toggle('off',!vo);if(vo)say('Voice on!');else sy.cancel()}
if(sy)sy.onvoiceschanged=function(){};

function countWords(){
  var cats=Object.keys(WORDS[curLang]);var t=0;
  for(var i=0;i<cats.length;i++)t+=WORDS[curLang][cats[i]].length;
  return t;
}
function countAllWords(){
  var t=0;var lk=Object.keys(WORDS);
  for(var i=0;i<lk.length;i++){var cats=Object.keys(WORDS[lk[i]]);for(var j=0;j<cats.length;j++)t+=WORDS[lk[i]][cats[j]].length}
  return t;
}

function buildLangs(){
  var h='';var keys=Object.keys(LANGS);
  for(var i=0;i<keys.length;i++){var k=keys[i],L=LANGS[k];
    h+='<div class="lang'+(k===curLang?' on':'')+'" onclick="setLang(\''+k+'\',this)"><span class="flag">'+L.flag+'</span>'+L.name+'</div>'}
  document.getElementById('langPick').innerHTML=h;
}
function buildCats(){
  var cats=Object.keys(WORDS[curLang]);
  if(!curCat||cats.indexOf(curCat)<0)curCat=cats[0];
  var h='';for(var i=0;i<cats.length;i++){
    var n=WORDS[curLang][cats[i]].length;
    h+='<div class="cat'+(cats[i]===curCat?' on':'')+'" onclick="setCat(\''+cats[i].replace(/\'/g,"\\'")+'\',this)">'+cats[i]+' <small>('+n+')</small></div>'}
  document.getElementById('catPick').innerHTML=h;
  document.getElementById('wCount').textContent=countWords()+' words in '+LANGS[curLang].name+' \u2022 '+countAllWords()+' total across all languages';
}
function setLang(k,el){
  curLang=k;
  document.querySelectorAll('.lang').forEach(function(l){l.classList.remove('on')});
  el.classList.add('on');
  buildCats();
  say("Great choice! Let's learn "+LANGS[k].name+"!");
  setTimeout(function(){newQ()},800);
}
function setCat(c,el){
  curCat=c;
  document.querySelectorAll('.cat').forEach(function(t){t.classList.remove('on')});
  el.classList.add('on');newQ();
}
function R(a,b){return Math.floor(Math.random()*(b-a+1))+a}

var curWord=null;
function newQ(){
  answered=false;
  var pool=WORDS[curLang][curCat];
  var idx=R(0,pool.length-1);
  curWord=pool[idx];
  var allEng=[];var cats=Object.keys(WORDS[curLang]);
  for(var c=0;c<cats.length;c++){
    var ws=WORDS[curLang][cats[c]];
    for(var w=0;w<ws.length;w++){if(ws[w][2]!==curWord[2])allEng.push(ws[w][2])}
  }
  allEng=[...new Set(allEng)];
  for(var i=allEng.length-1;i>0;i--){var j=R(0,i);var t=allEng[i];allEng[i]=allEng[j];allEng[j]=t}
  var wrongs=allEng.slice(0,3);
  var opts=[curWord[2]].concat(wrongs);
  for(var i=opts.length-1;i>0;i--){var j=R(0,i);var t=opts[i];opts[i]=opts[j];opts[j]=t}
  var ci=opts.indexOf(curWord[2]);

  var h='<div class="prompt">';
  h+='<div class="prompt-word">'+curWord[0]+'</div>';
  if(curWord[1])h+='<div class="prompt-rom">'+curWord[1]+'</div>';
  h+='<div class="prompt-hint">What does this mean in English?</div>';
  h+='<button class="hear-btn" onclick="sayWord(\''+curWord[0].replace(/\'/g,"\\'").replace(/\?/g,"").replace(/\u00bf/g,"")+'\')">🔊 Hear Pronunciation</button>';
  h+='</div>';
  h+='<div class="opts">';
  for(var i=0;i<opts.length;i++){
    h+='<div class="opt" onclick="pick(this,'+i+','+ci+')">'+opts[i]+'</div>';
  }
  h+='</div><div class="fb" id="fb"></div>';
  h+='<button class="nxt" onclick="newQ()">\u27a1\ufe0f Next Word</button>';
  document.getElementById('arena').innerHTML=h;
  setTimeout(function(){sayWord(curWord[0])},300);
}

function pick(el,i,ci){
  if(answered)return;answered=true;
  var opts=document.querySelectorAll('.opt');
  opts.forEach(function(o){o.style.pointerEvents='none'});
  opts[ci].classList.add('cor');
  tot++;
  var fb=document.getElementById('fb');
  if(i===ci){
    cor++;str++;
    fb.textContent='\u2705 Correct! '+curWord[0]+' = '+curWord[2];
    fb.style.color='#4ade80';
    var praise=['Correct!','Excellent!','Perfect!','Great job!','Amazing!','Wonderful!','Keep going!','Brilliant!'];
    say(praise[R(0,praise.length-1)]);
  }else{
    el.classList.add('wr');str=0;
    fb.textContent='\u274c '+curWord[0]+' means "'+curWord[2]+'"';
    fb.style.color='#ef4444';
    say(curWord[0]+' means '+curWord[2],curLang);
  }
  upd();
}
function upd(){
  document.getElementById('sC').textContent=cor;
  document.getElementById('sS').textContent=str;
  document.getElementById('sT').textContent=tot;
  document.getElementById('sA').textContent=tot>0?Math.round(cor/tot*100)+'%':'0%';
  var badges=[['bBr',3],['bSi',10],['bGo',25],['bPl',50]];
  for(var i=0;i<badges.length;i++){
    if(cor>=badges[i][1]){
      var b=document.getElementById(badges[i][0]);
      if(!b.classList.contains('on')){
        b.classList.add('on');
        var names=['Bronze','Silver','Gold','Platinum'];
        say('Congratulations! You earned the '+names[i]+' badge!');
      }
    }
  }
}

function openDict(){
  var L=LANGS[curLang];
  document.getElementById('dictTitle').textContent='\ud83d\udcd6 '+L.flag+' '+L.name+' Dictionary \u2014 '+countWords()+' Words';
  var cats=Object.keys(WORDS[curLang]);
  var h='';
  for(var c=0;c<cats.length;c++){
    h+='<div class="dict-cat">'+cats[c]+' ('+WORDS[curLang][cats[c]].length+')</div>';
    var words=WORDS[curLang][cats[c]];
    for(var w=0;w<words.length;w++){
      h+='<div class="dict-row"><span class="dw">'+words[w][0]+'</span>';
      if(words[w][1])h+='<span class="dr">'+words[w][1]+'</span>';
      h+='<span class="de">'+words[w][2]+'</span></div>';
    }
  }
  document.getElementById('dictBody').innerHTML=h;
  document.getElementById('dictModal').style.display='block';
}
function closeDict(){document.getElementById('dictModal').style.display='none'}

buildLangs();buildCats();
setTimeout(function(){say("Welcome to World Languages! Pick a language flag to start learning. I'll speak every word for you!")},600);

</script>
